<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="d-flex align-items-center justify-content-around">
      <div class="title">MOVIE EXPLORER</div>
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search movies..."
          class="form-control"
        />
    </div>
    <button id="showFavorites" class="btn btn-outline-danger">
      <i class="fa-solid fa-heart"></i> Favorites
    </button>
    <div>

        <select id="ratingSort" class="form-control">
         <option value="">Sort by Rating</option>
         <option value="asc">Rating: Low → High</option>
         <option value="desc">Rating: High → Low</option>
       </select>
    </div>
    </header>
    <main>
      <div
        class="modal fade"
        id="movieModal"
        tabindex="-1"
        role="dialog"
        aria-labelledby="movieModalLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog modal-lg" role="document">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="movieModalLabel">Movie Details</h5>
              <button
                type="button"
                class="close"
                data-dismiss="modal"
                aria-label="Close"
              >
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body"></div>
          </div>
        </div>
      </div>

      <ul class="movie-list"></ul>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
